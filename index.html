<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite STL | Marketplace 3D Premium</title>
    
    <!-- === BIBLIOTECAS === -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- === CONFIGURAÇÃO DO TEMA TAIWIND === -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            base: '#050505',    // Fundo mais profundo e elegante
                            panel: '#0E0E11',   // Painéis e Sidebar
                            surface: '#16161A', // Cards de produtos
                            border: '#27272A',  // Linhas divisórias sutis
                            text: '#A1A1AA',    // Cinza para leitura
                        },
                        brand: {
                            DEFAULT: '#D99A3D', // O Dourado Oficial
                            hover: '#F2AF4A',   // Dourado mais claro pro hover
                            glow: 'rgba(217, 154, 61, 0.15)' // Brilho
                        },
                        drive: {
                            card: '#0D131C',    // Azul escuro elegante do card Drive
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <!-- === ESTILOS CUSTOMIZADOS (Animações e Scroll) === -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: #FFFFFF; 
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar Invisível/Elegante */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272A; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D99A3D; }
        
        /* Sistema de Rotas (Páginas) */
        .page-view { display: none; opacity: 0; }
        .page-view.active { display: block; animation: fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeSlideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Efeito Textura Opcional */
        .bg-grid-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-sm bg-grid-pattern">

    <!-- ========================================== -->
    <!-- 1. SIDEBAR (MENU LATERAL)                  -->
    <!-- ========================================== -->
    <aside class="w-64 bg-dark-panel/90 backdrop-blur-xl border-r border-dark-border flex flex-col h-full z-40 hidden md:flex shrink-0 shadow-2xl relative">
        
        <!-- Logo -->
        <div class="h-20 px-6 flex items-center gap-4 border-b border-dark-border/50 shrink-0">
            <div class="bg-gradient-to-br from-brand to-brand-hover text-black w-9 h-9 rounded-xl flex items-center justify-center font-bold text-xl shadow-[0_0_15px_rgba(217,154,61,0.4)]">
                <i class="ph-fill ph-cube"></i>
            </div>
            <div class="flex flex-col">
                <span class="font-bold text-xl tracking-tight text-white leading-none">EliteSTL</span>
                <span class="text-[9px] font-bold text-brand tracking-[0.2em] uppercase mt-0.5">Marketplace</span>
            </div>
        </div>

        <!-- Links de Navegação -->
        <div class="flex-1 py-6 flex flex-col gap-8 px-4 overflow-y-auto">
            <div>
                <span class="text-[10px] font-bold text-dark-text tracking-widest mb-4 block px-3">MENU PRINCIPAL</span>
                <nav class="flex flex-col gap-1.5">
                    <!-- Botão Ativo -->
                    <button onclick="navigate('home')" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-brand/10 text-brand font-semibold relative overflow-hidden transition-all hover:bg-brand/20">
                        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-1/2 bg-brand rounded-r-full shadow-[0_0_10px_rgba(217,154,61,1)]"></div>
                        <i class="ph-fill ph-house text-xl"></i> Início
                    </button>
                    <!-- Botão Inativo -->
                    <button class="flex items-center gap-3 px-4 py-3 rounded-xl text-dark-text hover:text-white hover:bg-dark-surface transition-all font-medium group">
                        <i class="ph ph-folder text-xl group-hover:text-brand transition-colors"></i> Meus Acessos
                    </button>
                </nav>
            </div>
        </div>

        <!-- Perfil do Usuário (Base da Sidebar) -->
        <div class="p-4 border-t border-dark-border/50 bg-dark-panel">
            <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-dark-surface transition cursor-pointer">
                <div class="w-10 h-10 rounded-full bg-dark-surface border border-dark-border flex items-center justify-center text-dark-text">
                    <i class="ph-fill ph-user text-xl"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-semibold text-white">Visitante</span>
                    <span class="text-xs text-dark-text">Fazer Login</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- ========================================== -->
    <!-- 2. ÁREA DE CONTEÚDO PRINCIPAL              -->
    <!-- ========================================== -->
    <main class="flex-1 flex flex-col h-screen relative">
        
        <!-- HEADER (Busca e Ícones) -->
        <header class="h-20 border-b border-dark-border/50 flex items-center justify-between px-8 shrink-0 bg-dark-base/80 backdrop-blur-md z-30 sticky top-0">
            <div class="relative w-full max-w-lg hidden md:block group">
                <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-dark-text text-lg group-focus-within:text-brand transition-colors"></i>
                <input type="text" placeholder="Buscar catálogos, pastas, autores..." 
                       class="w-full bg-dark-surface/50 border border-dark-border rounded-full py-2.5 pl-12 pr-4 text-white placeholder-dark-text focus:outline-none focus:border-brand/50 focus:bg-dark-surface focus:ring-4 ring-brand/10 transition-all">
            </div>
            
            <div class="flex items-center gap-5 ml-auto">
                <button class="text-dark-text hover:text-white transition-colors relative">
                    <i class="ph ph-bell text-2xl"></i>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-brand rounded-full"></span>
                </button>
                <div class="w-px h-6 bg-dark-border"></div>
                <button class="bg-white text-black font-bold py-2 px-5 rounded-full hover:scale-105 hover:shadow-[0_0_15px_rgba(255,255,255,0.2)] transition-all">
                    Acessar Conta
                </button>
            </div>
        </header>

        <!-- ÁREA SCROLLÁVEL -->
        <div class="flex-1 overflow-y-auto scroll-smooth relative" id="scroll-area">
            
            <!-- ====== VIEW 1: VITRINE DE PASTAS (HOME) ====== -->
            <div id="view-home" class="page-view active w-full p-6 md:p-10 pb-20">
                <div class="max-w-7xl mx-auto">
                    <div class="flex items-end justify-between mb-8">
                        <div>
                            <h2 class="text-3xl font-bold text-white tracking-tight">Catálogos Premium</h2>
                            <p class="text-dark-text mt-1">Navegue pelas pastas e acesse via Google Drive.</p>
                        </div>
                    </div>
                    
                    <!-- GRID DE CARDS GERADO VIA JS -->
                    <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
                </div>
            </div>

            <!-- ====== VIEW 2: TELA GOOGLE DRIVE (AÇÃO) ====== -->
            <div id="view-drive" class="page-view w-full p-6 md:p-10 min-h-full flex flex-col relative">
                
                <div class="max-w-4xl mx-auto w-full flex-1 flex flex-col justify-center py-10">
                    
                    <button onclick="navigate('home')" class="self-start flex items-center gap-2 px-4 py-2 rounded-lg bg-dark-surface border border-dark-border text-dark-text hover:text-white hover:border-brand/50 transition-all mb-10 group">
                        <i class="ph ph-arrow-left text-lg group-hover:-translate-x-1 transition-transform"></i> Voltar ao início
                    </button>

                    <!-- CARD PRINCIPAL DO DRIVE -->
                    <div class="w-full bg-gradient-to-b from-drive-card to-[#070A0E] rounded-[24px] p-10 md:p-16 flex flex-col items-center justify-center text-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/5 relative overflow-hidden group">
                        
                        <!-- Brilho de fundo sutil -->
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-brand/10 blur-[100px] rounded-full pointer-events-none"></div>

                        <!-- Ícone -->
                        <div class="relative mb-6">
                            <i class="ph-fill ph-folder text-brand text-[80px] drop-shadow-[0_0_20px_rgba(217,154,61,0.3)] group-hover:scale-110 transition-transform duration-500"></i>
                        </div>
                        
                        <!-- Textos -->
                        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4 tracking-tight">Google Drive</h1>
                        <p class="text-dark-text text-base md:text-lg mb-10 max-w-lg leading-relaxed">
                            Este conteúdo é de alto volume e está hospedado em nuvem. Clique abaixo para visualizar os arquivos.
                        </p>
                        
                        <!-- Botão de Ação -->
                        <a id="drive-action-btn" href="#" target="_blank" class="bg-brand hover:bg-brand-hover text-black font-bold py-4 px-10 rounded-xl flex items-center gap-3 transition-all duration-300 text-lg shadow-[0_10px_30px_rgba(217,154,61,0.25)] hover:shadow-[0_10px_40px_rgba(217,154,61,0.5)] hover:-translate-y-1">
                            Abrir no Google Drive <i class="ph-bold ph-arrow-up-right text-xl"></i>
                        </a>
                    </div>

                    <!-- Rodapé do Card (Título dinâmico) -->
                    <div class="mt-8 text-center flex flex-col items-center">
                        <span class="text-dark-text text-xs uppercase tracking-[0.2em] font-bold mb-2">Pasta Selecionada</span>
                        <h2 id="drive-pack-title" class="text-2xl font-bold text-white border-b-2 border-brand/30 pb-1">Nome do Pack</h2>
                    </div>

                </div>
            </div>

        </div>
    </main>

    <!-- ========================================== -->
    <!-- 3. JAVASCRIPT (LÓGICA E BANCO DE DADOS)    -->
    <!-- ========================================== -->
    <script>
        // ----------------------------------------------------
        // BANCO DE DADOS (Edite aqui seus catálogos)
        // ----------------------------------------------------
        const catalogs = [
            {
                id: 'pack-2026',
                title: 'Pack Elite 2026',
                category: 'Premium',
                image: 'https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?q=80&w=600&auto=format&fit=crop', 
                driveLink: 'https://drive.google.com/drive/folders/SEU_LINK_DO_DRIVE_AQUI' 
            },
            {
                id: 'pack-chaveiros',
                title: 'Coleção Chaveiros',
                category: 'Acessórios',
                image: 'https://images.unsplash.com/photo-1588636400609-b78ccfc11776?q=80&w=600&auto=format&fit=crop',
                driveLink: 'https://drive.google.com/drive/folders/SEU_LINK_DO_DRIVE_AQUI'
            },
            {
                id: 'pack-action-figures',
                title: 'Action Figures HD',
                category: 'Colecionáveis',
                image: 'https://images.unsplash.com/photo-1599305090598-fe179d501227?q=80&w=600&auto=format&fit=crop',
                driveLink: 'https://drive.google.com/drive/folders/SEU_LINK_DO_DRIVE_AQUI'
            },
            {
                id: 'pack-decor',
                title: 'Design de Interiores',
                category: 'Decoração',
                image: 'https://images.unsplash.com/photo-1485955900006-10f4d324d411?q=80&w=600&auto=format&fit=crop',
                driveLink: 'https://drive.google.com/drive/folders/SEU_LINK_DO_DRIVE_AQUI'
            }
            // Copie e cole os blocos acima para adicionar mais.
        ];

        // ----------------------------------------------------
        // FUNÇÃO 1: RENDERIZAR OS CARDS NA TELA INICIAL
        // ----------------------------------------------------
        function renderCatalogs() {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = ''; 

            catalogs.forEach(pack => {
                const card = document.createElement('div');
                // Estilos do Card Ultra Premium (Glass, bordas sutis, animações suaves)
                card.className = `
                    bg-dark-surface border border-dark-border/50 rounded-2xl overflow-hidden 
                    hover:border-brand/40 hover:shadow-[0_10px_30px_rgba(0,0,0,0.5)] hover:-translate-y-1.5 
                    transition-all duration-300 cursor-pointer group flex flex-col relative
                `;
                
                card.innerHTML = `
                    <!-- Área da Imagem -->
                    <div class="h-48 overflow-hidden relative bg-dark-base">
                        <!-- Imagem com zoom suave no hover -->
                        <img src="${pack.image}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-110 transition-all duration-700 ease-out">
                        
                        <!-- Gradiente sobre a imagem para leitura fácil -->
                        <div class="absolute inset-0 bg-gradient-to-t from-dark-surface via-transparent to-transparent opacity-90"></div>
                        
                        <!-- Badge "Drive" Glassmorphism -->
                        <div class="absolute bottom-3 left-4 bg-black/40 backdrop-blur-md text-white px-2.5 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5 border border-white/10 group-hover:border-brand/50 group-hover:text-brand transition-colors">
                            <i class="ph-bold ph-google-drive-logo text-sm"></i> Pasta Drive
                        </div>
                    </div>

                    <!-- Textos do Card -->
                    <div class="p-5 flex-1 flex flex-col justify-center relative">
                        <span class="text-[10px] text-brand font-bold uppercase tracking-widest mb-1.5">${pack.category}</span>
                        <h3 class="text-lg font-bold text-white leading-tight group-hover:text-brand transition-colors">${pack.title}</h3>
                        
                        <!-- Ícone de seta que aparece no hover -->
                        <div class="absolute right-5 bottom-5 w-8 h-8 rounded-full bg-dark-base border border-dark-border flex items-center justify-center text-dark-text opacity-0 translate-y-2 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-300">
                            <i class="ph-bold ph-arrow-right"></i>
                        </div>
                    </div>
                `;
                
                // Evento de clique
                card.onclick = () => openDriveScreen(pack);
                grid.appendChild(card);
            });
        }

        // ----------------------------------------------------
        // FUNÇÃO 2: ABRIR A TELA DO GOOGLE DRIVE
        // ----------------------------------------------------
        function openDriveScreen(pack) {
            // Atualiza as informações da tela do Drive baseadas no card clicado
            document.getElementById('drive-pack-title').innerText = pack.title;
            document.getElementById('drive-action-btn').href = pack.driveLink;

            // Navega para a tela
            navigate('drive');
        }

        // ----------------------------------------------------
        // FUNÇÃO 3: CONTROLAR NAVEGAÇÃO ENTRE TELAS
        // ----------------------------------------------------
        function navigate(viewName) {
            // Remove classe active de todas
            document.querySelectorAll('.page-view').forEach(el => {
                el.classList.remove('active');
            });
            
            // Joga o scroll pro topo suavemente
            document.getElementById('scroll-area').scrollTo({ top: 0, behavior: 'smooth' });

            // Adiciona a classe active na view correta (aciona a animação CSS)
            setTimeout(() => {
                document.getElementById(`view-${viewName}`).classList.add('active');
            }, 50); // Pequeno delay pra garantir o reflow da animação
        }

        // ----------------------------------------------------
        // INICIALIZAÇÃO
        // ----------------------------------------------------
        window.onload = renderCatalogs;
    </script>
</body>
</html>
