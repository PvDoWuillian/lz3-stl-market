<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite STL - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 50:'#2a2a2a', 100:'#222', 200:'#1a1a1a', 300:'#141414', 400:'#111', 500:'#0a0a0a', 600:'#050505' },
                        gold: { 400:'#d4a574', 500:'#b8935a', 600:'#9a7b4a' }
                    },
                    fontFamily: { inter: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #d4a574; border-radius: 3px; }
        
        /* Card Hover */
        .product-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(212, 165, 116, 0.3);
        }
        .product-card:hover .product-image {
            transform: scale(1.05);
        }
        
        .product-image {
            transition: transform 0.6s ease;
        }

        .sidebar-link {
            transition: all 0.3s ease;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(90deg, rgba(212, 165, 116, 0.1), transparent);
            border-left: 3px solid #d4a574;
            color: #d4a574;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4a574, #b8935a);
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 165, 116, 0.3);
        }

        .lock-overlay {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="font-inter bg-dark-500 text-white">

    <!-- SIDEBAR -->
    <aside class="fixed left-0 top-0 h-full w-20 lg:w-64 bg-dark-600 border-r border-white/5 z-50 flex flex-col">
        <div class="p-4 lg:p-6 flex items-center justify-center lg:justify-start gap-3 border-b border-white/5">
            <div class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-cube text-black text-lg lg:text-xl"></i>
            </div>
            <span class="hidden lg:block font-bold text-lg">Elite <span class="text-gold-400">STL</span></span>
        </div>

        <nav class="flex-1 py-6 flex flex-col gap-2">
            <a href="#" class="sidebar-link active flex items-center justify-center lg:justify-start gap-4 px-4 lg:px-6 py-4 text-gray-400 hover:text-gold-400">
                <i class="fas fa-home text-lg w-6"></i>
                <span class="hidden lg:block text-sm font-medium">Início</span>
            </a>
            <a href="#" class="sidebar-link flex items-center justify-center lg:justify-start gap-4 px-4 lg:px-6 py-4 text-gray-400 hover:text-gold-400">
                <i class="fas fa-cube text-lg w-6"></i>
                <span class="hidden lg:block text-sm font-medium">Produtos</span>
            </a>
            <a href="#" class="sidebar-link flex items-center justify-center lg:justify-start gap-4 px-4 lg:px-6 py-4 text-gray-400 hover:text-gold-400">
                <i class="fas fa-folder text-lg w-6"></i>
                <span class="hidden lg:block text-sm font-medium">Categorias</span>
            </a>
            <a href="#" class="sidebar-link flex items-center justify-center lg:justify-start gap-4 px-4 lg:px-6 py-4 text-gray-400 hover:text-gold-400">
                <i class="fas fa-heart text-lg w-6"></i>
                <span class="hidden lg:block text-sm font-medium">Favoritos</span>
            </a>
            <a href="#" class="sidebar-link flex items-center justify-center lg:justify-start gap-4 px-4 lg:px-6 py-4 text-gray-400 hover:text-gold-400">
                <i class="fas fa-shopping-bag text-lg w-6"></i>
                <span class="hidden lg:block text-sm font-medium">Carrinho</span>
            </a>
            <a href="#" class="sidebar-link flex items-center justify-center lg:justify-start gap-4 px-4 lg:px-6 py-4 text-gray-400 hover:text-gold-400">
                <i class="fas fa-user text-lg w-6"></i>
                <span class="hidden lg:block text-sm font-medium">Conta</span>
            </a>
        </nav>

        <div class="p-4 border-t border-white/5">
            <a href="#" class="flex items-center justify-center lg:justify-start gap-3 px-4 py-3 rounded-xl bg-green-500/10 text-green-400 hover:bg-green-500/20 transition-all">
                <i class="fab fa-whatsapp text-xl"></i>
                <span class="hidden lg:block text-sm font-medium">Suporte</span>
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="ml-20 lg:ml-64 min-h-screen">
        
        <!-- HEADER -->
        <header class="sticky top-0 z-40 bg-dark-600/80 backdrop-blur-xl border-b border-white/5">
            <div class="flex items-center justify-between px-6 lg:px-10 py-5">
                <div class="hidden md:flex flex-1 max-w-xl">
                    <div class="relative w-full">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" placeholder="Buscar modelos..." class="w-full pl-12 pr-4 py-2.5 rounded-xl bg-white/5 border border-white/10 focus:border-gold-500/50 focus:outline-none text-sm text-gray-300">
                    </div>
                </div>
                
                <button class="md:hidden p-2 rounded-lg hover:bg-white/5">
                    <i class="fas fa-search"></i>
                </button>

                <a href="#" class="ml-auto px-6 py-2.5 rounded-xl btn-gold text-black font-bold text-sm flex items-center gap-2">
                    <i class="fas fa-mobile-alt"></i>
                    <span class="hidden sm:inline">Instalar App</span>
                </a>
            </div>
        </header>

        <!-- BANNER -->
        <section class="relative h-40 lg:h-64 overflow-hidden mb-10">
            <div class="absolute inset-0 bg-gradient-to-r from-dark-600 via-dark-300/90 to-transparent z-10"></div>
            <div class="absolute inset-0 bg-cover bg-center opacity-60" style="background-image: url('https://images.unsplash.com/photo-1631630259742-c0f0b17c6c10?w=1400&h=400&fit=crop');"></div>
            <div class="relative z-20 h-full flex items-center px-8 lg:px-16">
                <div>
                    <h1 class="text-3xl lg:text-5xl font-black mb-2">ELITE <span class="text-gold-400">STL</span></h1>
                    <p class="text-gray-400 text-sm lg:text-base">Os melhores modelos 3D para impressão</p>
                </div>
            </div>
        </section>

        <!-- CONTEÚDO PRINCIPAL -->
        <section class="px-6 lg:px-10 pb-20">
            <h2 class="text-2xl lg:text-3xl font-bold mb-8">Produtos</h2>
            
            <!-- GRID DE PRODUTOS -->
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Os produtos são inseridos aqui automaticamente pelo JavaScript -->
            </div>

            <!-- Template para você adicionar novos produtos (COPIE E COLE NO ARRAY ABAIXO) -->
            <!--
            {
                id: 999,
                nome: "Nome do Produto",
                imagem: "caminho/para/imagem.jpg",
                preco: "R$ 99,90",
                bloqueado: false,
                categoria: "Categoria"
            },
            -->
        </section>
    </main>

    <script>
        // ============================================
        // 📦 LISTA DE PRODUTOS - EDITE AQUI!
        // ============================================
        // COMO ADICIONAR PRODUTO:
        // 1. Copie o bloco comentado acima
        // 2. Cole antes da chave final ]
        // 3. Altere os valores
        // 4. Para imagem: use caminho local (ex: "img/produto1.jpg") ou URL
        
        const PRODUTOS = [
            {
                id: 1,
                nome: "Primeiros Passos",
                imagem: "https://images.unsplash.com/photo-1633356122544-f134324a6cee?w=400&h=300&fit=crop",
                preco: "R$ 29,90",
                bloqueado: false,
                categoria: "Iniciante"
            },
            {
                id: 2,
                nome: "Pack STL Basic",
                imagem: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=400&h=300&fit=crop",
                preco: "R$ 149,90",
                bloqueado: true,
                categoria: "Pack"
            },
            {
                id: 3,
                nome: "Pack STL Premium",
                imagem: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&h=300&fit=crop",
                preco: "R$ 297,90",
                bloqueado: true,
                categoria: "Pack"
            },
            {
                id: 4,
                nome: "Articulated Dragon",
                imagem: "https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=400&h=300&fit=crop",
                preco: "R$ 19,90",
                bloqueado: false,
                categoria: "Miniaturas"
            },
            {
                id: 5,
                nome: "Cosplay Helmet",
                imagem: "https://images.unsplash.com/photo-1608889825205-eebdb9fc5806?w=400&h=300&fit=crop",
                preco: "R$ 45,00",
                bloqueado: false,
                categoria: "Cosplay"
            },
            {
                id: 6,
                nome: "Geometric Vase",
                imagem: "https://images.unsplash.com/photo-1581783898377-1c85bf937427?w=400&h=300&fit=crop",
                preco: "R$ 12,90",
                bloqueado: false,
                categoria: "Decoração"
            },
            {
                id: 7,
                nome: "Mecha Keycap",
                imagem: "https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?w=400&h=300&fit=crop",
                preco: "Grátis",
                bloqueado: false,
                categoria: "Acessórios"
            },
            {
                id: 8,
                nome: "Functional Gears",
                imagem: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400&h=300&fit=crop",
                preco: "R$ 8,90",
                bloqueado: false,
                categoria: "Mecânica"
            }
        ];

        // ============================================
        // 🎨 RENDERIZAÇÃO (NÃO PRECISA EDITAR AQUI)
        // ============================================
        
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            
            grid.innerHTML = PRODUTOS.map((produto, index) => `
                <div class="product-card fade-in rounded-2xl overflow-hidden bg-dark-300 border border-white/5 relative" style="animation-delay: ${index * 100}ms">
                    
                    <!-- IMAGEM DO PRODUTO -->
                    <div class="relative aspect-[4/3] overflow-hidden bg-dark-400">
                        <img src="${produto.imagem}" 
                             alt="${produto.nome}" 
                             class="product-image w-full h-full object-cover"
                             onerror="this.src='https://via.placeholder.com/400x300/1a1a1a/d4a574?text=Sem+Imagem'">
                        
                        ${produto.bloqueado ? `
                            <!-- OVERLAY DE BLOQUEIO -->
                            <div class="lock-overlay absolute inset-0 flex flex-col items-center justify-center z-10">
                                <i class="fas fa-lock text-4xl text-gold-400 mb-3"></i>
                                <p class="text-sm text-gray-300 text-center px-4">Você ainda não adquiriu esse produto.</p>
                            </div>
                        ` : ''}

                        ${!produto.bloqueado && produto.preco !== "Grátis" ? `
                            <div class="absolute top-3 right-3 bg-dark-500/90 backdrop-blur-sm px-3 py-1 rounded-lg border border-white/10">
                                <span class="text-gold-400 font-bold text-sm">${produto.preco}</span>
                            </div>
                        ` : ''}
                    </div>

                    <!-- INFO DO PRODUTO -->
                    <div class="p-5">
                        <span class="text-xs text-gold-400/70 uppercase tracking-wider mb-2 block">${produto.categoria}</span>
                        <h3 class="text-lg font-bold mb-3 line-clamp-1">${produto.nome}</h3>
                        
                        ${!produto.bloqueado ? `
                            <div class="flex items-center justify-between">
                                <span class="text-2xl font-bold text-gold-400">${produto.preco}</span>
                                <button onclick="addToCart(${produto.id})" class="px-4 py-2 rounded-xl bg-white/5 border border-white/10 hover:border-gold-500/50 hover:bg-gold-500/10 transition-all text-sm font-medium">
                                    <i class="fas fa-cart-plus mr-1"></i> Comprar
                                </button>
                            </div>
                        ` : `
                            <button class="w-full py-2.5 rounded-xl border border-white/10 text-gray-500 cursor-not-allowed text-sm flex items-center justify-center gap-2">
                                <i class="fas fa-lock"></i> Bloqueado
                            </button>
                        `}
                    </div>
                </div>
            `).join('');
        }

        // ============================================
        // 🛒 FUNÇÕES (OPCIONAL - SÓ SE QUISER CARRINHO)
        // ============================================
        
        function addToCart(id) {
            const produto = PRODUTOS.find(p => p.id === id);
            alert(`"${produto.nome}" adicionado ao carrinho!\n\nEntre em contato pelo WhatsApp para finalizar.`);
            // Aqui você pode integrar com WhatsApp ou backend
        }

        // ============================================
        // 🚀 INICIALIZAÇÃO
        // ============================================
        
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            
            // Mobile sidebar toggle (opcional)
            // Se quiser adicionar botão mobile para sidebar, adicione o HTML e essa função
        });
    </script>
</body>
</html>
